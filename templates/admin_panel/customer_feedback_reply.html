{% extends 'base.html' %}
{% block title %}Reply to Customer Feedback{% endblock %}

{% block content %}
<div class="page-header">
  <h1>View & Reply</h1>
  <p>Customer: {{ entry.customer.user.username }}</p>
</div>

<div class="form-card" style="max-width: 900px;">
  <div class="form-group">
    <label>Type</label>
    <input type="text" value="{{ entry.get_feedback_type_display }}" readonly />
  </div>

  <div class="form-group">
    <label>Subject</label>
    <input type="text" value="{{ entry.subject }}" readonly />
  </div>

  <div class="form-group">
    <label>Customer Message</label>
    <textarea rows="6" readonly>{{ entry.message }}</textarea>
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status">
        {% for key, label in status_choices %}
          <option value="{{ key }}" {% if entry.status == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="admin_reply">Reply to Customer</label>
      <textarea id="admin_reply" name="admin_reply" rows="5" placeholder="Write your reply to the customer...">{{ entry.admin_note }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Reply</button>
      <a href="{% url 'admin_customer_feedbacks' %}" class="btn btn-outline">Back</a>
    </div>
  </form>
</div>
{% endblock %}
